# Render Blueprint — deploy as Web Service
# Docs: https://render.com/docs/blueprint-spec
#
# Startup merges data/company_master.json into SQLite every boot (curated MS slugs, etc.).
# Frontend: render_build.sh runs "npm run build" only if npm exists; otherwise commit static/.
# Same-origin UI: build frontend with VITE_API_BASE_URL empty, or set in dashboard for split domains.
services:
  - type: web
    name: earnings-research-api
    runtime: python
    region: oregon

    buildCommand: chmod +x scripts/render_build.sh && bash scripts/render_build.sh
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Writable paths (Render's project dir can be read-only; /tmp is writable)
      - key: DATABASE_PATH
        value: /tmp/earnings-data/earnings.db
      - key: REPORT_OUTPUT_DIR
        value: /tmp/earnings-outputs
      # Allow previews when Yahoo has a quote but financials/MS are thin (maximize ticker coverage)
      - key: REPORT_READINESS_MODE
        value: permissive
      # Optional: restrict CORS to your frontend (comma-separated origins)
      # - key: CORS_ORIGINS
      #   value: https://your-app.onrender.com,https://your-custom-domain.com
      # For Gemini news summarization (set in Render dashboard if you use it):
      # - key: GEMINI_API_KEY
      #   sync: false

    # Render free tier has 30s request timeout; preview can take 30–90s with LLM.
    # Increase on paid plan or use skip_llm=true from frontend for faster demos.
    healthCheckPath: /health
